<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VkusVill Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 16px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
  h2 { font-size: 0.875rem; font-weight: 700; color: #94a3b8; margin-bottom: 12px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .row  { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .col2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  @media(max-width:600px){ .col4{grid-template-columns:repeat(2,1fr);} }
  .stat-card { background:#1e293b; border:1px solid #334155; border-radius:12px;
               padding:14px; text-align:center; }
  .stat-num { font-size:2rem; font-weight:700; }
  .stat-lbl { font-size:11px; color:#64748b; margin-top:4px; }
  .green { color:#4ade80; } .red { color:#f87171; } .yellow { color:#fbbf24; }
  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
         border: none; font-size: 0.875rem; transition: opacity .15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { opacity: 0.82; } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-blue   { background: #2563eb; color: #fff; }
  .btn-green  { background: #16a34a; color: #fff; }
  .btn-red    { background: #dc2626; color: #fff; }
  .btn-yellow { background: #ca8a04; color: #fff; }
  .btn-purple { background: #7c3aed; color: #fff; }
  .btn-gray   { background: #475569; color: #fff; }
  .btn-sm     { padding: 4px 10px; font-size: 11px; }
  /* Input */
  input[type=password], input[type=text] {
    flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
    border-radius: 8px; padding: 8px 12px; font-size: 0.875rem; outline: none; }
  input:focus { border-color: #3b82f6; }
  /* Badges */
  .badge { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; display: inline-block; }
  .badge-on  { background: #166534; color: #86efac; }
  .badge-off { background: #1e293b; color: #64748b; border: 1px solid #334155; }
  /* Log */
  #log { font-family: monospace; font-size: 12px; background: #0f172a;
         border: 1px solid #334155; border-radius: 8px; padding: 12px;
         height: 300px; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; }
  /* Status row */
  .status-row { display:flex; align-items:center; gap:10px; padding:8px;
                border-radius:8px; background:rgba(15,23,42,.6); margin-bottom:6px; }
  .status-name { width:60px; font-size:11px; font-weight:700; color:#cbd5e1; flex-shrink:0; }
  .status-time { flex:1; font-size:11px; color:#475569; }
  /* Misc */
  .text-muted { color:#64748b; font-size:12px; }
  .mt2 { margin-top: 8px; }
  .hidden { display: none; }
  .running { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #auth-error { color:#f87171; font-size:0.875rem; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">

<!-- Auth -->
<div id="auth-section">
  <h1>🛠️ VkusVill Admin Panel</h1>
  <div class="card">
    <div class="row">
      <input type="password" id="token-input" placeholder="Admin token (по умолчанию: vv-admin-2026)">
      <button class="btn btn-blue" onclick="saveToken()">🔑 Войти</button>
    </div>
    <p id="auth-error" class="hidden">❌ Неверный токен</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">

  <div class="row" style="justify-content:space-between; margin-bottom:12px">
    <h1>🛠️ VkusVill Admin</h1>
    <div class="row">
      <span id="last-refresh" class="text-muted"></span>
      <button class="btn btn-gray btn-sm" onclick="logout()">Выйти</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="col4">
    <div class="stat-card">
      <div class="stat-num" id="cnt-total">—</div>
      <div class="stat-lbl">📦 Всего</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="cnt-green">—</div>
      <div class="stat-lbl">🟢 Зелёные</div>
      <div class="stat-lbl">Сайт: <span id="cnt-live">—</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-num red" id="cnt-red">—</div>
      <div class="stat-lbl">🔴 Красные</div>
    </div>
    <div class="stat-card">
      <div class="stat-num yellow" id="cnt-yellow">—</div>
      <div class="stat-lbl">🟡 Жёлтые</div>
    </div>
  </div>

  <div class="card text-muted" id="updated-at" style="text-align:center; margin-top:10px">
    Последнее обновление: —
  </div>

  <!-- Actions -->
  <div class="card">
    <h2>⚡ Запуск скраперов</h2>
    <div class="row">
      <button class="btn btn-green"  id="btn-green"  onclick="runScraper('green')">🟢 Зелёный</button>
      <button class="btn btn-red"    id="btn-red"    onclick="runScraper('red')">🔴 Красный</button>
      <button class="btn btn-yellow" id="btn-yellow" onclick="runScraper('yellow')">🟡 Жёлтый</button>
      <button class="btn btn-blue"   id="btn-all"    onclick="runScraper('all')">🔄 Все сразу</button>
      <button class="btn btn-gray"   id="btn-merge"  onclick="runScraper('merge')">🔀 Merge</button>
      <button class="btn btn-purple" id="btn-login"  onclick="runScraper('login')">🔑 Ре-логин</button>
    </div>
  </div>

  <!-- Status -->
  <div class="card">
    <h2>📊 Статус скраперов</h2>
    <div id="scraper-status-list"></div>
  </div>

  <!-- Logs -->
  <div class="card">
    <div class="row" style="justify-content:space-between; margin-bottom:10px">
      <h2 style="margin:0">📋 Логи (последние 100 строк)</h2>
      <div class="row">
        <button class="btn btn-gray btn-sm" onclick="loadLogs()">🔄 Обновить</button>
        <button class="btn btn-gray btn-sm" onclick="clearLog()">🗑 Очистить</button>
      </div>
    </div>
    <div id="log">Нажмите «Обновить» чтобы загрузить логи...</div>
  </div>

</div><!-- /dashboard -->
</div><!-- /wrap -->

<script>
var token = sessionStorage.getItem('vv_admin_token') || '';
var autoRefreshInterval = null;

window.onload = function() {
  document.getElementById('token-input').value = token;
  if (token) { tryAuth(); }
};

function saveToken() {
  token = document.getElementById('token-input').value.trim();
  sessionStorage.setItem('vv_admin_token', token);
  tryAuth();
}

function tryAuth() {
  fetch('/admin/status', { headers: { 'X-Admin-Token': token } })
    .then(function(r) {
      if (r.status === 403) { throw new Error('forbidden'); }
      return r.json();
    })
    .then(function(data) {
      document.getElementById('auth-error').classList.add('hidden');
      document.getElementById('auth-section').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      applyStatus(data);
      startAutoRefresh();
      loadLogs();
    })
    .catch(function() {
      document.getElementById('auth-error').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('auth-section').classList.remove('hidden');
    });
}

function logout() {
  token = '';
  sessionStorage.removeItem('vv_admin_token');
  stopAutoRefresh();
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('auth-section').classList.remove('hidden');
}

function applyStatus(data) {
  var d = data.data || {};
  document.getElementById('cnt-total').textContent  = (d.total  !== undefined) ? d.total  : '—';
  document.getElementById('cnt-green').textContent  = (d.green  !== undefined) ? d.green  : '—';
  document.getElementById('cnt-red').textContent    = (d.red    !== undefined) ? d.red    : '—';
  document.getElementById('cnt-yellow').textContent = (d.yellow !== undefined) ? d.yellow : '—';
  document.getElementById('cnt-live').textContent   = d.greenLiveCount || '—';
  document.getElementById('updated-at').textContent = d.updatedAt
    ? 'Последнее обновление: ' + d.updatedAt
    : 'Данных нет';
  document.getElementById('last-refresh').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU');

  var list = document.getElementById('scraper-status-list');
  list.innerHTML = '';
  var scrapers = data.scrapers || {};
  var names = Object.keys(scrapers);
  for (var i = 0; i < names.length; i++) {
    var name = names[i];
    var s = scrapers[name];
    var isRunning = s.running;
    var exitIcon = (s.exit_code === 0) ? 'OK' : (s.exit_code === null ? '—' : 'ERR');
    var badgeHtml = isRunning
      ? '<span class="badge badge-on running">РАБОТАЕТ</span>'
      : '<span class="badge badge-off">' + exitIcon + '</span>';
    var stopHtml = isRunning
      ? '<button class="btn btn-red btn-sm" onclick="killInfo()">Стоп</button>'
      : '';
    var lastRun = s.last_run ? 'Запуск: ' + s.last_run : 'Не запускался';
    var row = document.createElement('div');
    row.className = 'status-row';
    row.innerHTML = '<div class="status-name">' + name.toUpperCase() + '</div>'
      + badgeHtml
      + '<div class="status-time">' + lastRun + '</div>'
      + stopHtml;
    list.appendChild(row);
  }

  var btnNames = ['green', 'red', 'yellow', 'all', 'merge', 'login'];
  for (var j = 0; j < btnNames.length; j++) {
    var btn = document.getElementById('btn-' + btnNames[j]);
    if (btn && scrapers[btnNames[j]]) {
      btn.disabled = scrapers[btnNames[j]].running;
    }
  }
}

function runScraper(name) {
  var btn = document.getElementById('btn-' + name);
  if (btn) { btn.disabled = true; }
  fetch('/admin/run/' + name, { method: 'POST', headers: { 'X-Admin-Token': token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      appendLog('[ADMIN] ' + JSON.stringify(data));
      setTimeout(refreshStatus, 1000);
    })
    .catch(function(e) {
      appendLog('[ADMIN] Error: ' + e);
      if (btn) { btn.disabled = false; }
    });
}

function killInfo() {
  alert('Дождитесь завершения текущего запуска или перезапустите бэкенд.');
}

function refreshStatus() {
  fetch('/admin/status', { headers: { 'X-Admin-Token': token } })
    .then(function(r) { return r.json(); })
    .then(function(data) { applyStatus(data); })
    .catch(function() {});
}

function loadLogs() {
  fetch('/admin/logs?n=100', { headers: { 'X-Admin-Token': token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var logEl = document.getElementById('log');
      logEl.textContent = data.lines.join('\n') || '(Логов пока нет)';
      logEl.scrollTop = logEl.scrollHeight;
    })
    .catch(function() {});
}

function clearLog() {
  document.getElementById('log').textContent = '(очищено)';
}

function appendLog(line) {
  var logEl = document.getElementById('log');
  if (logEl.textContent === 'Нажмите «Обновить» чтобы загрузить логи...'
      || logEl.textContent === '(очищено)') {
    logEl.textContent = '';
  }
  logEl.textContent += line + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshInterval = setInterval(refreshStatus, 5000);
}

function stopAutoRefresh() {
  if (autoRefreshInterval) { clearInterval(autoRefreshInterval); autoRefreshInterval = null; }
}
</script>
</body>
</html>
