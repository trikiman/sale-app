<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="VkusVill Mini App — browse products, manage favorites, and track prices." />
    <meta property="og:title" content="VkusVill Mini App" />
    <meta property="og:description" content="Browse products, manage favorites, and track prices." />
    <meta property="og:type" content="website" />
    <title>VkusVill Mini App</title>
    <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Inline loading skeleton — shown instantly before JS loads, React replaces this -->
      <div style="min-height:100vh;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;padding:24px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
        <div style="font-size:24px;font-weight:700;margin-bottom:8px;">🏷 Все акции ВкусВилл</div>
        <div style="font-size:12px;opacity:0.5;margin-bottom:20px;">Загружаем товары…</div>
        <!-- Skeleton cards -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;width:100%;max-width:1200px;">
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;"></div>
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;animation-delay:0.2s;"></div>
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;animation-delay:0.4s;"></div>
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;animation-delay:0.6s;"></div>
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;animation-delay:0.8s;"></div>
          <div style="background:rgba(255,255,255,0.05);border-radius:16px;height:220px;animation:skpulse 1.5s ease-in-out infinite;animation-delay:1.0s;"></div>
        </div>
        <style>@keyframes skpulse{0%,100%{opacity:.4}50%{opacity:.8}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
