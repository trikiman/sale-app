name: Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Miniapp lint (eslint + stylelint) ────────────────────────────
  lint-miniapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      # v1.27: TOOL-08 fully met — all 5 react-hooks advisories from the
      # v1.26 carry-forward refactored away. lint --max-warnings=0 enforces
      # zero warnings going forward; both react/forbid-dom-props and
      # react-hooks rules at ERROR level fail CI on regression.
      - name: ESLint (zero errors, zero warnings)
        run: npm run lint -- --max-warnings=0

      # v1.26 Phase 85: declaration-property-value-allowed-list bumped from
      # warning → error. The 135-violation spacing-scale baseline is now
      # zero (var(--space-*) tokens). New off-scale spacing values fail CI.
      - name: Stylelint (zero errors, spacing scale enforced)
        run: npm run lint:css

  # ── Miniapp unit + snapshot tests (Vitest + RTL) ─────────────────
  test-miniapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      # v1.26 Phase 83 (TEST-01/02/03): Vitest + RTL harness for miniapp.
      # Covers productMeta helpers + cartStep + isTelegramRuntime unit
      # tests + ProductCard/CartPanel/StaleBanner snapshot tests pinning
      # v1.23 UX invariants. Must stay green before Phase 84 inline-style
      # refactor touches any DOM structure.
      - name: Vitest
        run: npm run test -- --run

  # ── Backend pytest ─────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'pydantic>=2' httpx uvicorn \
                      pytest pytest-asyncio anyio \
                      python-dotenv beautifulsoup4 aiohttp \
                      lxml sqlalchemy

      - name: Run backend tests
        run: python -m pytest backend/ -q --tb=short

      # v1.25 Phase 81 integration tests (Linux-safe subset).
      # Windows-skipped tests (pool IO race w/ open handles,
      # xray process tests) are excluded here — Linux is production.
      - name: Run integration tests
        run: |
          python -m pytest \
            tests/test_vless_quarantine.py \
            tests/test_collapse_replay.py \
            tests/test_pool_state_io_race.py \
            -q --tb=short
